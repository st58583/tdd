services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_NAME=rental_db
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      - db
    command: tail -f /dev/null

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rental_db
    ports:
      - "3307:3306"