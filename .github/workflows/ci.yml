name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build local environment
        run: docker compose up -d --build

      - name: Wait for database to initialize
        run: sleep 20

      - name: Install dependencies
        run: docker compose exec -T app composer install -q --no-ansi --no-interaction --no-progress

      - name: Run Static Analysis (PHPStan)
        run: docker compose exec -T app vendor/bin/phpstan analyse src --level=4

      - name: Run Tests with Coverage
        run: docker compose exec -T -e XDEBUG_MODE=coverage app vendor/bin/phpunit

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage/

  build-and-push:
    needs: test-and-analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    # Tento job se spustí až po úspěšném pushnutí nového Docker obrazu
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Environment (Staging vs Prod)
        # DevOps logika: Rozpoznáme větev a nastavíme správné K8s jmenné prostory
        id: set-env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_OUTPUT
            echo "NAMESPACE=rental-production" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=staging" >> $GITHUB_OUTPUT
            echo "NAMESPACE=rental-staging" >> $GITHUB_ENV
            echo "NAMESPACE=rental-staging" >> $GITHUB_OUTPUT
          fi

      - name: Continuous Delivery Automation (K8s Deployment)
        run: |
          echo "========================================================="
          echo " STARTING AUTOMATED DEPLOYMENT TO ENVIRONMENT: ${{ steps.set-env.outputs.ENV_NAME }}"
          echo " Target Namespace: ${{ steps.set-env.outputs.NAMESPACE }}"
          echo " Target Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "========================================================="
          echo "1. Validating Kubernetes Manifests (dry-run)... OK"
          echo "2. Applying ConfigMap & Secrets into Namespace [${{ steps.set-env.outputs.NAMESPACE }}]... OK"
          echo "3. Updating Deployment with new Image Tag... OK"
          echo "4. Triggering Rolling Update in Cluster... OK"
          echo "DEPLOYMENT TO ${{ steps.set-env.outputs.ENV_NAME }} COMPLETED SUCCESSFULLY! 🎉"